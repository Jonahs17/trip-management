name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name : Checkout code
        uses : actions/checkout@v3

      - name : Set up Docker
        uses : docker/setup-buildx-action@v3

      - name : Build Auth Service
        run : docker build ./services/auth-service

      - name : Build Frontend
        run : docker build ./frontend